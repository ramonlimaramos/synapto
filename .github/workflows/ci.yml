name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: set up python
        run: uv python install 3.13

      - name: install dependencies
        run: uv sync --extra dev --python 3.13
        env:
          UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

      - name: ruff check
        run: uv run ruff check src/ tests/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: set up python
        run: uv python install 3.13

      - name: install dependencies
        run: uv sync --extra dev --python 3.13
        env:
          UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

      - name: bandit security scan
        run: uv run bandit -r src/synapto/ -c pyproject.toml

      - name: pip-audit dependency scan
        # CVE-2025-3000 is currently reported against torch, pulled transitively by
        # sentence-transformers, with no fixed version available from pip-audit
        # as of 2026-06-14. Keep the rest of the dependency audit active.
        run: uv run pip-audit --ignore-vuln CVE-2025-3000

  test:
    runs-on: ubuntu-latest
    needs: [lint, security]
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: synapto
          POSTGRES_PASSWORD: synapto
          POSTGRES_DB: synapto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U synapto"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: set up python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: install dependencies (cpu-only torch for ci)
        run: uv sync --extra dev --python ${{ matrix.python-version }}
        env:
          UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

      - name: create pgvector extension
        run: PGPASSWORD=synapto psql -h localhost -U synapto -d synapto -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: test
        env:
          SYNAPTO_PG_DSN: postgresql://synapto:synapto@localhost:5432/synapto
          SYNAPTO_REDIS_URL: redis://localhost:6379/1
        run: uv run pytest tests/ -v --cov=synapto --cov-report=term-missing
