name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: synapto
          POSTGRES_PASSWORD: synapto
          POSTGRES_DB: synapto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U synapto"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: set up python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: lint
        run: uv run ruff check src/ tests/

      - name: test
        env:
          SYNAPTO_PG_DSN: postgresql://synapto:synapto@localhost:5432/synapto
          SYNAPTO_REDIS_URL: redis://localhost:6379/1
        run: uv run pytest tests/ -v --cov=synapto --cov-report=term-missing
