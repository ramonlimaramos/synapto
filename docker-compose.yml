services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: synapto
      POSTGRES_PASSWORD: synapto
      POSTGRES_DB: synapto
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapto"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  synapto:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SYNAPTO_PG_DSN: postgresql://synapto:synapto@postgres:5432/synapto
      SYNAPTO_REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    entrypoint: ["sh", "-c", "synapto init && synapto serve"]
    stdin_open: true
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8080)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  redisdata:
